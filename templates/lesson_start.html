{% extends "base.html" %}
{% load static %}
{% block content %}

<section class="trainer-page">
  <div class="trainer-overlay"></div>

  <div class="trainer-wrap">
    <div class="trainer-ui">

      <!-- Заголовок урока -->
      <div class="lesson-head">
        <div>
          <h1 class="lesson-title">{{ lesson.title }}</h1>
          <div class="lesson-subtitle">{{ lesson.short_description|default:"" }}</div>
        </div>

        <div class="lesson-meta">
          <div class="pill">⌨️ {{ lesson.keys_covered|default:"" }}</div>
        </div>
      </div>

      <!-- ТЕКСТ ДЛЯ НАБОРА -->
      <div class="target-box">
        <span id="targetText">{{ lesson_text }}</span>
      </div>

      <!-- ВВОД -->
      <div class="input-area">
        <input
          id="typingInput"
          type="text"
          autocomplete="off"
          placeholder="{% if learning_language == 'uk' %}Почни друкувати тут...{% else %}Start typing here...{% endif %}"
        />
        <div id="hint" class="hint"></div>
      </div>

      <!-- СЦЕНА: РУКИ + КЛАВИАТУРА -->
      <div class="kb-scene">
        <div class="hand-panel" id="handLeft">
          {% include "partials/hand_left.svg" %}
        </div>

        <div class="keyboard-shell">
          <div id="keyboard" class="keyboard"></div>
        </div>

        <div class="hand-panel" id="handRight">
          {% include "partials/hand_right.svg" %}
        </div>
      </div>

      <!-- КНОПКИ -->
      <div class="actions">
        <button id="btnRepeat" type="button" class="btn btn-ghost">
          ↻ {% if learning_language == "uk" %}Повторити урок{% else %}Restart{% endif %}
        </button>

        <button id="btnDone" type="button" class="btn btn-green" disabled>
          ✔ {% if learning_language == "uk" %}Виконано{% else %}Done{% endif %}
        </button>
      </div>

      <div id="resultBox" class="result" style="display:none;"></div>

    </div>
  </div>
</section>

<style>
  main { padding: 0 !important; }

  :root{
    --c-pinky: 252,166,189;
    --c-ring:  176,227,255;
    --c-middle:255,219,180;
    --c-index: 206,252,150;
    --c-thumb: 223,194,255;

    --glow: 0 0 0 3px rgba(39,211,107,0.90), 0 0 24px rgba(39,211,107,0.45);
    --wrongGlow: 0 0 0 3px rgba(229,57,53,0.95), 0 0 24px rgba(229,57,53,0.45);
  }

  .trainer-page{
    position: relative;
    min-height: calc(100vh - 56px);
    background-image: url("{% static 'img/lesson1.png' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow: hidden;
  }

  .trainer-overlay{
    position:absolute;
    inset:0;
    background:
      radial-gradient(900px 520px at 22% 25%, rgba(90, 180, 255, 0.12), transparent 60%),
      radial-gradient(900px 520px at 72% 35%, rgba(175, 90, 255, 0.14), transparent 55%),
      linear-gradient(180deg, rgba(10, 8, 25, 0.50) 0%, rgba(10, 8, 25, 0.65) 70%, rgba(10, 8, 25, 0.72) 100%);
    pointer-events:none;
  }

  .trainer-wrap{
    position: relative;
    z-index: 2;
    max-width: 1440px;
    margin-left: 36px;
    margin-right: auto;
    padding: 26px 18px 54px;
  }

  @media (max-width: 1400px){
    .trainer-wrap{ margin-left: 18px; max-width: 1320px; }
  }
  @media (max-width: 860px){
    .trainer-wrap{ margin: 0 auto; max-width: 100%; }
  }

  .trainer-ui{ display: grid; gap: 14px; }

  .lesson-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap: 14px;
    flex-wrap: wrap;
    color: rgba(255,255,255,0.95);
  }
  .lesson-title{
    margin:0;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 1000;
    letter-spacing: .2px;
  }
  .lesson-subtitle{
    margin-top: 6px;
    font-weight: 800;
    opacity: .85;
  }
  .lesson-meta{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content:flex-end;
  }
  .pill{
    font-size: 13px;
    font-weight: 950;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 26px rgba(0,0,0,0.18);
  }

  .target-box{
    border-radius: 16px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.14);
    padding: 18px 18px;
    font-size: 24px;
    color: rgba(255,255,255,0.95);
    white-space: pre-wrap;
    text-align: center;
  }

  .input-area{ display:grid; gap: 10px; }

  #typingInput{
    width:100%;
    padding: 14px 16px;
    font-size: 20px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.94);
    outline: none;
    user-select:none;
  }

  #typingInput:focus{
    box-shadow: 0 0 0 3px rgba(39,211,107,0.25);
    border-color: rgba(39,211,107,0.35);
  }

  .hint{
    color: rgba(255,255,255,0.86);
    font-weight: 800;
    min-height: 22px;
  }

  .kb-scene{
    margin-top: 4px;
    display: grid;
    grid-template-columns: 220px 1fr 220px;
    gap: 14px;
    align-items: center;
  }

  .hand-panel{
    height: 240px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: transparent;
    border: none;
    box-shadow: none;
  }
  .hand-panel svg{ width: 185px; height: 185px; }

  .finger-glow{
    filter: drop-shadow(0 0 10px rgba(39,211,107,0.95))
            drop-shadow(0 0 26px rgba(39,211,107,0.60));
    transform-origin: center;
    animation: fingerPulse .55s ease-in-out infinite alternate;
  }
  @keyframes fingerPulse{
    from { transform: scale(1); }
    to   { transform: scale(1.035); }
  }

  .keyboard-shell{
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    padding: 14px;
  }

  .keyboard{ border-radius: 16px; padding: 8px; }

  .kb-row{
    display:flex;
    gap: 10px;
    margin: 10px 0;
    justify-content:center;
    flex-wrap: nowrap;
  }

  .key{
    height: 52px;
    border-radius: 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 16px;
    font-weight: 900;
    user-select:none;
    color: rgba(255,255,255,0.96);
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: 0 10px 18px rgba(0,0,0,0.18);
    transition: transform .06s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }

  .w-1 { width: 52px; }
  .w-125 { width: 72px; }
  .w-150 { width: 86px; }
  .w-175 { width: 104px; }
  .w-200 { width: 124px; }
  .w-225 { width: 144px; }
  .w-600 { width: 420px; }

  .f-L-pinky, .f-R-pinky { background: rgba(var(--c-pinky), .20); }
  .f-L-ring,  .f-R-ring  { background: rgba(var(--c-ring),  .20); }
  .f-L-middle,.f-R-middle{ background: rgba(var(--c-middle),.20); }
  .f-L-index, .f-R-index { background: rgba(var(--c-index), .20); }
  .f-thumb { background: rgba(var(--c-thumb), .20); }

  .key.active{
    box-shadow: var(--glow);
    border-color: rgba(39,211,107,0.45);
    transform: translateY(-1px);
  }

  .key.shift-needed{
    box-shadow: 0 0 0 3px rgba(255,255,255,0.40), 0 0 22px rgba(255,255,255,0.20);
  }

  .key.wrong{
    box-shadow: var(--wrongGlow);
    border-color: rgba(229,57,53,0.45);
    transform: translateY(-1px);
  }

  .actions{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 2px;
  }

  .btn{
    border: 0;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 900;
    cursor: pointer;
  }

  .btn-ghost{ background: rgba(255,255,255,0.88); }
  .btn-green{
    background: #27d36b;
    color: #0b1b10;
    box-shadow: 0 12px 28px rgba(39, 211, 107, 0.30);
  }
  .btn:disabled{ opacity: .55; cursor: not-allowed; }

  .result{
    margin-top: 6px;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(255,255,255,0.25);
    color: #0b1020;
    font-weight: 800;
  }

  @media (max-width: 1060px){
    .kb-scene{ grid-template-columns: 180px 1fr 180px; }
    .hand-panel{ height: 220px; }
    .hand-panel svg{ width: 160px; height: 160px; }
    .w-600{ width: 320px; }
  }

  @media (max-width: 860px){
    .kb-scene{ grid-template-columns: 1fr; }
    .hand-panel{ height: 190px; }
    .kb-row{ flex-wrap: wrap; }
    .w-600{ width: 100%; max-width: 420px; }
  }

  @media (max-width: 1200px){
    .trainer-wrap{ transform: translateX(-20px) scale(1.04); }
  }
  @media (max-width: 860px){
    .trainer-wrap{ transform: none; }
  }
</style>

  const SHIFT_MAP = {
    "~":"`","!":"1","@":"2","#":"3","$":"4","%":"5","^":"6","&":"7","*":"8","(":"9",")":"0",

  };

  layout.forEach(row => {
    const rowEl = document.createElement("div");
    rowEl.className = "kb-row";
    row.forEach(k => {

      el.className = `key ${k.w} ${k.z}`;
      el.dataset.v = k.v;
      el.dataset.finger = k.finger;
      el.textContent = k.label;
      rowEl.appendChild(el);
    });
    keyboard.appendChild(rowEl);

  const keys = Array.from(document.querySelectorAll(".key"));

  // ========= Подсветка пальцев (SVG) =========
  function clearFingerGlow(){
    ["L_pinky","L_ring","L_middle","L_index","L_thumb","R_pinky","R_ring","R_middle","R_index","R_thumb"]
      .forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("finger-glow");
      });
  }

  function glowFinger(id){
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add("finger-glow");
  }

  // ========= Выбор клавиши для expectedChar + SHIFT =========
  function isUpperLetter(ch){
    return ch && ch.toLowerCase && ch !== ch.toLowerCase();
  }

  function normalizeExpected(ch){
    if (ch === " ") return { base: " ", needsShift: false };

    if (isUpperLetter(ch)) {
      return { base: ch.toLowerCase(), needsShift: true };
    }

    if (SHIFT_MAP[ch]) {
      return { base: SHIFT_MAP[ch], needsShift: true };
    }

    return { base: ch, needsShift: false };
  }

  function clearKeyStates(){
    keys.forEach(k => k.classList.remove("active","wrong","shift-needed"));
  }

  function findKeyByValue(v){
    return keys.find(k => k.dataset.v === v);
  }

  function getShiftKeyForMainFinger(mainFingerId){
    const isLeft = mainFingerId && mainFingerId.startsWith("L_");
    return isLeft ? findKeyByValue("ShiftRight") : findKeyByValue("ShiftLeft");
  }

  function highlight(expectedChar){
    clearKeyStates();
    clearFingerGlow();

    const { base, needsShift } = normalizeExpected(expectedChar);

    const keyEl = findKeyByValue(base);
    if (keyEl) {
      keyEl.classList.add("active");
      const finger = keyEl.dataset.finger;

      if (base === " ") {
        glowFinger("L_thumb");
        glowFinger("R_thumb");
      } else if (finger) {
        glowFinger(finger);
      }

      if (needsShift) {
        const shiftEl = getShiftKeyForMainFinger(finger);
        if (shiftEl) {
          shiftEl.classList.add("active","shift-needed");
          glowFinger(shiftEl.dataset.finger || (shiftEl.dataset.v === "ShiftLeft" ? "L_pinky" : "R_pinky"));
        }
      }
    }

const hint = document.getElementById("hint");
if (!hint) return;

// показываем подсказку только для пробела
if (base === " ") {
  hint.textContent = (LANG === "uk") ? "Пробіл — великим пальцем" : "Space — use thumb";
} else {
  hint.textContent = "";
}

  }

  function flashWrong(expectedChar){
    const { base, needsShift } = normalizeExpected(expectedChar);
    clearKeyStates();
    clearFingerGlow();

    const keyEl = findKeyByValue(base);
    if (keyEl) keyEl.classList.add("wrong");

    if (needsShift){
      const finger = keyEl?.dataset.finger || "L_index";
      const shiftEl = getShiftKeyForMainFinger(finger);
      if (shiftEl) shiftEl.classList.add("wrong");
    }

    setTimeout(() => highlight(expectedChar), 180);
  }

  // ========= УРОК (без метрик) =========
  const targetText = document.getElementById("targetText").textContent;
  const input = document.getElementById("typingInput");

  const btnRepeat = document.getElementById("btnRepeat");
  const btnDone = document.getElementById("btnDone");
  const resultBox = document.getElementById("resultBox");

  function moveCursorToEnd() {
    const len = input.value.length;
    input.setSelectionRange(len, len);
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" || e.key === "Delete") { e.preventDefault(); return; }
    const blockedNav = ["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Home","End"];
    if (blockedNav.includes(e.key)) { e.preventDefault(); return; }
    if ((e.ctrlKey || e.metaKey) && ["v","x","a"].includes(e.key.toLowerCase())) { e.preventDefault(); return; }
  });

  input.addEventListener("paste", (e) => e.preventDefault());
  input.addEventListener("cut", (e) => e.preventDefault());
  input.addEventListener("click", moveCursorToEnd);
  input.addEventListener("focus", moveCursorToEnd);
  input.addEventListener("select", moveCursorToEnd);

  let progress = 0;
  let errors = 0;
  let totalKeystrokes = 0;

  function finish() {
    resultBox.style.display = "block";
    resultBox.innerHTML = `
      <b>${LANG === "uk" ? "Урок виконано ✅" : "Lesson completed ✅"}</b><br>
      ${LANG === "uk" ? "Помилки" : "Errors"}: ${errors}
    `;
    btnDone.disabled = false;
  }

  highlight(targetText[0] || " ");
  input.focus();

  input.addEventListener("input", () => {
    let raw = input.value;
    moveCursorToEnd();

    if (raw.length <= progress) {
      input.value = raw.slice(0, progress);
      highlight(targetText[progress] || " ");
      return;
    }

    const typedChar = raw[raw.length - 1];
    const expectedChar = targetText[progress] || "";

    totalKeystrokes += 1;

    if (typedChar !== expectedChar) {
      errors += 1;
      input.value = raw.slice(0, progress);
      flashWrong(expectedChar);
      return;
    }

    progress += 1;
    input.value = raw.slice(0, progress);

    if (progress >= targetText.length) {
      finish();
      return;
    }

    highlight(targetText[progress]);
  });

  btnRepeat.addEventListener("click", () => {
    progress = 0;
    errors = 0;
    totalKeystrokes = 0;

    input.value = "";
    resultBox.style.display = "none";
    resultBox.innerHTML = "";
    btnDone.disabled = true;

    clearKeyStates();
    clearFingerGlow();
    document.getElementById("hint").textContent = "";

    highlight(targetText[0] || " ");
    input.focus();
  });

  function getCookie(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
  }

  // ✅ "Виконано" -> POST /lessons/<id>/complete/ и после успеха назад к списку
  btnDone.addEventListener("click", async () => {
    try {
      const resp = await fetch("{% url 'lesson_complete' lesson.id %}", {
        method: "POST",
        headers: { "X-CSRFToken": getCookie("csrftoken") }
      });

      const data = await resp.json().catch(() => ({}));
      if (data.ok) {
        resultBox.style.display = "block";
        resultBox.innerHTML += "<br><span style='color:green; font-weight:900;'>" +
          (LANG === "uk" ? "Збережено ✅" : "Saved ✅") +
          "</span>";

        setTimeout(() => { window.location.href = "{% url 'lessons_list' %}"; }, 550);
      } else {
        resultBox.style.display = "block";
        resultBox.innerHTML += "<br><span style='color:red; font-weight:900;'>" +
          (LANG === "uk" ? "Помилка збереження" : "Save error") +
          "</span>";
      }
    } catch (e) {
      resultBox.style.display = "block";
      resultBox.innerHTML += "<br><span style='color:red; font-weight:900;'>" +
        (LANG === "uk" ? "Помилка мережі" : "Network error") +
        "</span>";
    }
  });
</script>
