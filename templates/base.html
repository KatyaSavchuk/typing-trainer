{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Typing Trainer</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --topbar-bg: rgba(10,10,12,.92);
      --topbar-border: rgba(255,255,255,.10);
      --topbar-text: rgba(255,255,255,.92);
      --topbar-hover: rgba(255,255,255,1);
      --topbar-pill: rgba(255,255,255,.10);

      --topbar-max: 1720px;
      --topbar-pad-x: 28px;
      --header-h: 68px;
    }

    html, body{
      height: 100%;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0b0a12;
      color: #fff;
      overflow-x: hidden;
    }

    header{
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--topbar-border);
      backdrop-filter: blur(10px);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 16px;
      width: min(var(--topbar-max), calc(100% - 24px));
      margin: 0 auto;
      padding: 10px var(--topbar-pad-x);
      min-height: var(--header-h);
    }

    nav{
      display:flex;
      gap: 12px;
      align-items:center;
      flex: 1;
      min-width: 0;
    }

    .brand{
      padding: 10px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      color: #fff;
      text-decoration:none;
      font-weight: 900;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .brand:hover{ background: rgba(255,255,255,.12); }

    .nav-link{
      color: var(--topbar-text);
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      transition: background .12s ease;
    }
    .nav-link:hover{
      background: var(--topbar-pill);
      color: var(--topbar-hover);
    }

    .auth-wrap{
      position: relative;
      display:flex;
      align-items:center;
      gap: 12px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .auth-icon{
      width: 42px;
      height: 42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      text-decoration: none;
      transition: background .12s ease, border-color .12s ease, transform .12s ease;
    }
    .auth-icon svg{
      width: 20px;
      height: 20px;
      fill: rgba(255,255,255,.92);
    }
    .auth-icon:hover{
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.22);
      transform: translateY(-1px);
    }

    .auth-btn{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.10);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      cursor: pointer;
      font-weight: 800;
    }
    .auth-btn:hover{
      background: rgba(255,255,255,.14);
    }

    .auth-menu{
      display:none;
      position:absolute;
      right: 0;
      top: 54px;
      width: 220px;
      background: rgba(20,20,28,.96);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      box-shadow: 0 16px 36px rgba(0,0,0,0.35);
      padding: 10px;
      z-index: 9999;
    }

    .auth-menu a{
      display:block;
      padding: 12px;
      border-radius: 12px;
      text-decoration:none;
      color: rgba(255,255,255,.92);
      font-weight: 800;
    }
    .auth-menu a:hover{ background: rgba(255,255,255,.10); }

    main{
      min-height: calc(100vh - var(--header-h));
      padding: 0;
    }

    @media (max-width: 980px){
      :root{
        --topbar-pad-x: 20px;
        --header-h: 64px;
      }

      .topbar{
        width: min(100% - 16px, var(--topbar-max));
      }

      nav{
        gap: 8px;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 760px){
      :root{
        --topbar-pad-x: 14px;
      }

      .topbar{
        width: calc(100% - 12px);
        padding: 10px var(--topbar-pad-x);
      }

      .nav-link{ font-size: 13px; padding: 9px 10px; }
      .auth-icon{ width: 38px; height: 38px; }
      .auth-icon svg{ width: 18px; height: 18px; }
      .brand{ padding: 9px 12px; }
    }
  </style>
</head>

<body>

<header>
  <div class="topbar">
    <nav>
      <a class="brand" href="/">Typing Trainer</a>
      <a class="nav-link" href="/lessons/">Уроки</a>
      <a class="nav-link" href="/trainer/">Тренажер</a>
      <a class="nav-link" href="/testing/">Тестування</a>
      <a class="nav-link" href="/games/">Ігри</a>
    </nav>

    <div class="auth-wrap">
      {% if request.user.is_authenticated %}
        <a class="auth-icon" href="{% url 'profile' %}" title="Профіль">
          <svg viewBox="0 0 24 24">
            <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2c-4.4 0-8 2.2-8 4.9V21h16v-2.1c0-2.7-3.6-4.9-8-4.9Z"/>
          </svg>
        </a>

        <a class="auth-icon" href="{% url 'profile_settings' %}" title="Налаштування">
          <svg viewBox="0 0 24 24">
            <path d="M12 8.5A3.5 3.5 0 1 0 15.5 12 3.5 3.5 0 0 0 12 8.5Zm7.4 3.5a7.8 7.8 0 0 0 .1-1 7.8 7.8 0 0 0-.1-1l2-1.6a.7.7 0 0 0 .2-.9l-1.9-3.3a.7.7 0 0 0-.9-.3l-2.4 1a7.4 7.4 0 0 0-1.7-1l-.4-2.5a.7.7 0 0 0-.7-.6H9.4a.7.7 0 0 0-.7.6l-.4 2.5a7.4 7.4 0 0 0-1.7 1l-2.4-1a.7.7 0 0 0-.9.3L1.4 7.5a.7.7 0 0 0 .2.9l2 1.6a7.8 7.8 0 0 0-.1 1 7.8 7.8 0 0 0 .1 1l-2 1.6a.7.7 0 0 0-.2.9l1.9 3.3a.7.7 0 0 0 .9.3l2.4-1a7.4 7.4 0 0 0 1.7 1l.4 2.5a.7.7 0 0 0 .7.6h3.2a.7.7 0 0 0 .7-.6l.4-2.5a.7.7 0 0 0 1.7-1l2.4 1a.7.7 0 0 0 .9-.3l1.9-3.3a.7.7 0 0 0-.2-.9Z"/>
          </svg>
        </a>
      {% else %}
        <button id="authBtn" type="button" class="auth-btn">
          Вхід ▾
        </button>

        <div id="authMenu" class="auth-menu">
          <a href="/login/">Увійти</a>
          <a href="/register/">Зареєструватися</a>
        </div>

        <script>
          (function () {
            const btn = document.getElementById("authBtn");
            const menu = document.getElementById("authMenu");
            if (!btn || !menu) return;

            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              menu.style.display = menu.style.display === "block" ? "none" : "block";
            });

            document.addEventListener("click", () => { menu.style.display = "none"; });
          })();
        </script>
      {% endif %}
    </div>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
